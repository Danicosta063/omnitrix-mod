name: Build Omnitrix Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Debug environment
        run: |
          echo "===== JAVA ====="
          java -XshowSettings:properties -version 2>&1 | head -20 || java -version
          echo ""
          echo "===== WORKSPACE FILES ====="
          ls -la
          echo ""
          echo "===== GRADLE WRAPPER PROPERTIES ====="
          if [ -f gradle/wrapper/gradle-wrapper.properties ]; then
            cat gradle/wrapper/gradle-wrapper.properties
          fi
          echo ""
          echo "===== GRADLE.PROPERTIES ====="
          if [ -f gradle.properties ]; then
            cat gradle.properties
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Check Gradle wrapper version
        run: ./gradlew --version

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties', '**/*.gradle', '**/gradle.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build (verbose with stacktrace)
        env:
          CI: true
        run: ./gradlew build --no-daemon --stacktrace --info --warning-mode all

      - name: Upload .jar artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: omnitrix-mod-build
          path: build/libs/*.jar
          retention-days: 30

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/reports/
            **/*.log
          retention-days: 7
